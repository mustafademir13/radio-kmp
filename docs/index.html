<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RadyoNova Web</title>
  <style>
    :root{--bg:#080A16;--card:#1B2342;--card2:#151C35;--txt:#EAF0FF;--muted:#9CA8C7;--p:#7C4DFF;--c:#22D3EE}
    *{box-sizing:border-box;font-family:Inter,system-ui,Arial,sans-serif}
    body{margin:0;background:linear-gradient(180deg,#2D1762,#080A16 35%,#0c1228);color:var(--txt)}
    .wrap{max-width:820px;margin:0 auto;padding:16px}
    .card{background:var(--card);border:1px solid #344061;border-radius:16px;padding:12px;margin-bottom:10px}
    h1{margin:0 0 8px;font-size:24px}.muted{color:var(--muted);font-size:13px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input,select,button{border:none;border-radius:10px;padding:10px}
    input,select{background:#2D3756;color:white}
    button{background:var(--p);color:white;cursor:pointer}
    button.secondary{background:#2D3756}
    .station{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:12px;border:1px solid #344061;margin-bottom:8px;background:var(--card2);cursor:pointer}
    .station.active{border-color:var(--c)}
    .mini{position:sticky;bottom:10px;z-index:10}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RadyoNova Web</h1>
    <div class="card" id="now">
      <div><strong id="name">İstasyon seç</strong></div>
      <div class="muted" id="meta">Hazır</div>
      <div class="row" style="margin-top:8px">
        <button id="playBtn">▶ Oynat</button>
        <button class="secondary" id="stopBtn">■ Durdur</button>
        <span class="muted" id="status">Durdu</span>
      </div>
    </div>

    <div class="card row">
      <input id="search" placeholder="Kanal ara" />
      <select id="tab"><option value="all">Tümü</option><option value="fav">Favori</option><option value="stable">Önerilen</option></select>
    </div>

    <div id="list"></div>

    <div class="card mini row">
      <div style="flex:1">
        <strong id="miniName">-</strong>
        <div class="muted" id="miniStatus">Durdu</div>
      </div>
      <button id="miniToggle">▶</button>
      <button class="secondary" id="miniStop">■</button>
    </div>
  </div>

<script>
const audio=new Audio();
let stations=[];let selected=null;let fav=new Set(JSON.parse(localStorage.getItem('fav')||'[]'));
const els={list:document.getElementById('list'),search:document.getElementById('search'),tab:document.getElementById('tab'),
 name:document.getElementById('name'),meta:document.getElementById('meta'),status:document.getElementById('status'),
 playBtn:document.getElementById('playBtn'),stopBtn:document.getElementById('stopBtn'),miniName:document.getElementById('miniName'),miniStatus:document.getElementById('miniStatus'),miniToggle:document.getElementById('miniToggle'),miniStop:document.getElementById('miniStop')};

function paint(){
  const q=els.search.value.toLowerCase(); const tab=els.tab.value;
  let items=stations.filter(s=>s.name.toLowerCase().includes(q));
  if(tab==='fav') items=items.filter(s=>fav.has(s.id));
  if(tab==='stable') items=items.filter(s=>(s.healthScore||70)>=70).sort((a,b)=>(b.healthScore||70)-(a.healthScore||70));
  els.list.innerHTML='';
  for(const s of items){
    const d=document.createElement('div'); d.className='station'+((selected&&selected.id===s.id)?' active':'');
    d.innerHTML=`<div><strong>${s.emoji||'📻'} ${s.name}</strong><div class="muted">${s.category||'Genel'} • ${s.region||'TR'} • ${s.bitrateKbps||128} kbps</div></div><button class="secondary">${fav.has(s.id)?'★':'☆'}</button>`;
    d.onclick=(e)=>{ if(e.target.tagName==='BUTTON'){ fav.has(s.id)?fav.delete(s.id):fav.add(s.id); localStorage.setItem('fav',JSON.stringify([...fav])); paint(); return;} selected=s; play(); paint();};
    els.list.appendChild(d);
  }
}
function sync(){
  els.miniName.textContent=selected?selected.name:'-';
  const st=audio.paused?'Durdu':'Çalıyor';
  els.status.textContent=st; els.miniStatus.textContent=st;
  els.playBtn.textContent=audio.paused?'▶ Oynat':'❚❚ Duraklat';
  els.miniToggle.textContent=audio.paused?'▶':'❚❚';
}
function play(){ if(!selected) return; if(audio.src!==selected.streamUrl) audio.src=selected.streamUrl; audio.play().catch(()=>{}); els.name.textContent=selected.name; els.meta.textContent=`${selected.category||'Genel'} • ${selected.region||'TR'}`; sync(); }
function toggle(){ if(audio.paused) play(); else audio.pause(); sync(); }
function stop(){ audio.pause(); audio.currentTime=0; sync(); }

els.playBtn.onclick=toggle; els.stopBtn.onclick=stop; els.miniToggle.onclick=toggle; els.miniStop.onclick=stop; els.search.oninput=paint; els.tab.onchange=paint;
audio.onplaying=sync; audio.onpause=sync; audio.onerror=()=>{els.status.textContent='Hata';els.miniStatus.textContent='Hata';};
fetch('./stations.json').then(r=>r.json()).then(j=>{stations=j; selected=stations[0]||null; paint(); sync();});
</script>
</body>
</html>
